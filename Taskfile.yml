version: '3'

vars:
  PHP_IMAGE: itkdev/php8.3-fpm:latest

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list
    silent: true

  coding-standards:check:
    desc: "Run all coding-standards checks (phpcs, blade, prettier, markdown, shellcheck)"
    cmds:
      - docker run --interactive --rm --volume {{.PWD}}:/app {{.PHP_IMAGE}} composer coding-standards-check
      - docker run --rm --volume {{.PWD}}:/app -w /app shufo/blade-formatter:1.11.11 Templates/*.blade.php --check-formatted
      - docker run --rm --volume {{.PWD}}:/work tmknom/prettier:latest --check assets
      - docker run --rm --volume {{.PWD}}:/md itkdev/markdownlint '**/*.md'
      # -x follows the `# shellcheck source=…` directives baked into the scripts; -P bin adds bin/ to the source search path.
      - docker run --rm --volume {{.PWD}}:/app --workdir /app peterdavehello/shellcheck shellcheck -P bin -x bin/create-release bin/deploy bin/local.create-release

  coding-standards:fix:
    desc: "Apply all coding-standards fixes (phpcbf, blade, prettier, markdown)"
    cmds:
      # phpcbf exits 1 when it has fixed issues, which is success — keep going.
      - cmd: docker run --interactive --rm --volume {{.PWD}}:/app {{.PHP_IMAGE}} composer coding-standards-apply
        ignore_error: true
      - docker run --rm --volume {{.PWD}}:/app -w /app shufo/blade-formatter:1.11.11 Templates/*.blade.php --write
      - docker run --rm --volume {{.PWD}}:/work tmknom/prettier:latest --write assets
      - docker run --rm --volume {{.PWD}}:/md itkdev/markdownlint '**/*.md' --fix
